<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Kit - Geometry Dash Clone</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #icon-kit-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(180deg, #0b0b3b 0%, #1a0a3e 50%, #2d1b69 100%);
        }

        .icon-header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .icon-header h1 {
            font-size: 48px;
            color: #fff;
            text-shadow: 0 0 20px rgba(120, 80, 255, 0.7);
            margin-bottom: 10px;
        }

        .icon-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .icon-tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            text-transform: capitalize;
        }

        .icon-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .icon-tab.active {
            background: #5533aa;
            border-color: #8855ff;
            box-shadow: 0 0 15px rgba(120, 80, 255, 0.5);
        }

        .icon-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            padding: 20px 40px;
            overflow-y: auto;
            align-content: start;
        }

        .icon-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            padding: 10px;
        }

        .icon-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .icon-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .icon-item .icon-id {
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 10px;
            opacity: 0.5;
        }

        .loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 24px;
        }

        /* Preview Area */
        .icon-preview {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .preview-box {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #5533aa;
        }

        .preview-info {
            max-width: 400px;
        }

        .preview-info h2 {
            margin-bottom: 8px;
            color: #00ff88;
        }

        .preview-info p {
            opacity: 0.7;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div id="icon-kit-container">
        <img src="sprites/ui/back.png" class="back-btn" onclick="location.href='index.html'">

        <div class="icon-header">
            <h1>ICON KIT</h1>
            <div class="icon-tabs" id="category-tabs">
                <!-- Tabs injected by JS -->
            </div>
        </div>

        <div class="icon-grid" id="icon-grid">
            <!-- Icons injected by JS -->
        </div>

        <div class="icon-preview">
            <div class="preview-box" id="preview-box">
                <p>?</p>
            </div>
            <div class="preview-info" id="preview-info">
                <h2 id="preview-title">Select an icon</h2>
                <div class="color-selectors" style="display:flex; gap:20px; margin-top:10px;">
                    <div class="color-field">
                        <label style="display:block; font-size:12px; margin-bottom:5px;">Color 1</label>
                        <input type="color" id="color1" value="#00ff88"
                            style="width:40px; height:40px; border:none; border-radius:8px; cursor:pointer;">
                    </div>
                    <div class="color-field">
                        <label style="display:block; font-size:12px; margin-bottom:5px;">Color 2</label>
                        <input type="color" id="color2" value="#ffffff"
                            style="width:40px; height:40px; border:none; border-radius:8px; cursor:pointer;">
                    </div>
                    <div class="action-field" style="display:flex; align-items:flex-end;">
                        <button id="btn-use-icon"
                            style="padding:10px 20px; background:#00ff88; color:#000; border:none; border-radius:8px; font-weight:bold; cursor:pointer; height:40px;">USE
                            THIS ICON</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading">
        Loading Icons...
    </div>

    <script src="js/iconkit.js"></script>
</body>

</html>
